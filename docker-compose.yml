version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: compliance_postgres
    environment:
      POSTGRES_DB: compliance_analytics
      POSTGRES_USER: compliance_user
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance_user -d compliance_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
